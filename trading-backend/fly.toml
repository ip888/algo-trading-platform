# Fly.io Configuration for Trading Backend
# Deploy with: fly deploy
# Region: Stockholm (arn) - good for EU

app = "trading-bot-igor-waw"
primary_region = "arn"  # Stockholm, Sweden

[build]
  dockerfile = "Dockerfile"

[env]
  # JVM settings for container
  JAVA_TOOL_OPTIONS = "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
  # Timezone — EST so logs match US market hours and all time logic is consistent
  TZ = "America/New_York"
  # Persistent volume path for trade DB (survives redeploys)
  DATA_DIR = "/data"
  # Rate limiting
  API_REQUEST_DELAY_MS = "500"
  SYMBOL_BATCH_SIZE = "4"
  ENABLE_ADAPTIVE_RATE_CONTROL = "true"
  # Cycle intervals: MAIN checks every 20s, EXPERIMENTAL every 40s to halve API load
  MAIN_CYCLE_INTERVAL_MS = "20000"
  EXP_CYCLE_INTERVAL_MS = "40000"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"   # Keep running 24/7 for trading!
  auto_start_machines = true
  min_machines_running = 1     # Always keep 1 instance running
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "10s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

# Persistent volume — trade history survives redeploys
[[mounts]]
  source = "trading_data"
  destination = "/data"
