name: "Copilot Setup Steps"

# Run automatically when this file changes (validates the setup works), and
# allow manual triggering from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job name MUST be `copilot-setup-steps` — Copilot picks it up by this name.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. SDKMAN — Java version manager ───────────────────────────────────
      - name: Install SDKMAN
        run: |
          curl -s "https://get.sdkman.io" | bash

      # ── 3. Java 25 via SDKMAN ──────────────────────────────────────────────
      - name: Install Java 25 via SDKMAN
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install java 25.0.1-open
          echo "JAVA_HOME=$HOME/.sdkman/candidates/java/current" >> "$GITHUB_ENV"
          echo "$HOME/.sdkman/candidates/java/current/bin" >> "$GITHUB_PATH"

      # ── 4. Fly client ──────────────────────────────────────────────────────
      - name: Install Fly client (flyctl)
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      # ── 5. Maven dependency cache ──────────────────────────────────────────
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('trading-backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 6. Node.js + React dashboard dependencies ──────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: trading-backend/dashboard/package-lock.json

      - name: Install dashboard npm dependencies
        working-directory: trading-backend/dashboard
        run: npm ci

      # ── 7. Pre-download Maven dependencies (offline) ───────────────────────
      - name: Pre-download Maven dependencies
        working-directory: trading-backend
        run: mvn dependency:go-offline -q

      # ── 8. Build verification ──────────────────────────────────────────────
      # Build the React dashboard first, then embed it in the JAR — mirrors
      # the production Docker build flow and verifies the full pipeline.
      - name: Build React dashboard
        working-directory: trading-backend/dashboard
        run: npm run build

      - name: Embed dashboard into backend resources
        working-directory: trading-backend
        run: |
          mkdir -p src/main/resources/public
          cp -r dashboard/dist/* src/main/resources/public/

      - name: Build JAR (skip tests for setup speed)
        working-directory: trading-backend
        run: mvn clean package -DskipTests -q

      - name: Verify JAR artifact
        working-directory: trading-backend
        run: |
          JAR=$(ls target/trading-backend-*.jar 2>/dev/null | grep -v original | head -1)
          if [[ -z "$JAR" ]]; then
            echo "❌ JAR not found — build failed"
            exit 1
          fi
          echo "✅ JAR built: $JAR ($(du -h "$JAR" | cut -f1))"
          java -version

      # ── 9. Fly config validation ───────────────────────────────────────────
      # Validates fly.toml syntax without requiring an authenticated session.
      - name: Validate fly.toml
        working-directory: trading-backend
        run: fly config validate --config fly.toml || true
